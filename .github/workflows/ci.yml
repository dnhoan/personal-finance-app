name: CI

# PR-blocking quality gates: lint, typecheck, unit tests, secret scan.
# Deployment is owned by Vercel's Git integration, NOT this workflow.
# e2e and DB-integration tests run separately (e2e.yml / migration-check.yml) —
# they need a real server/DB and are not on the PR hot path.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref to save minutes.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Job-scoped dummy env. validateEnv() (src/lib/env.ts) runs at module load
    # for `next build`, `next dev`, AND vitest — so every step needs these or it
    # throws. These are THROWAWAY format-valid placeholders, NOT credentials:
    # the unit suite (test:unit) hits no DB and the build does not connect
    # (every DB page uses a dynamic API, opting out of static prerender).
    env:
      CI: "true"
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?sslmode=require"
      BETTER_AUTH_SECRET: "ci-dummy-better-auth-secret-not-a-real-value-000"
      GOOGLE_CLIENT_ID: "ci-dummy.apps.googleusercontent.com"
      GOOGLE_CLIENT_SECRET: "ci-dummy-google-client-secret"
      ALLOWED_EMAIL: "ci@example.com"
      BOT_TOKEN: "0000000000:CIDUMMYBOTTOKENNOTREALAAAAAAAAAAAAAAAA"
      TELEGRAM_OWNER_USER_ID: "0"
      TELEGRAM_DM_CHAT_ID: "0"
      WEBHOOK_SECRET: "ci-dummy-webhook-secret-not-a-real-value-00000"
      CRON_SECRET: "ci-dummy-cron-secret-not-a-real-value-000000000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migration consistency (schema vs journal, no DB)
        run: npm run db:check

      - name: Unit tests (no DB)
        # test:unit excludes the 7 DB-coupled files; runs fork-safe with no Neon key.
        run: npm run test:unit

      - name: Build (verify production build compiles)
        run: npm run build

      - name: Scan for leaked secrets
        # Guards a public repo: blocks real credentials landing in YAML/code.
        # Pin to a commit SHA before relying on this as a required check.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
